name: Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          .\windows\installer\build.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: HA-Input-Bridge-Setup
          path: windows/installer/dist/HA-Input-Bridge-Setup.exe
          if-no-files-found: error

      - name: Attach installer to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $Tag = "${{ github.ref_name }}"
          $Repo = "${{ github.repository }}"
          $Installer = "windows/installer/dist/HA-Input-Bridge-Setup.exe"

          gh release view $Tag --repo $Repo
          if ($LASTEXITCODE -ne 0) {
            gh release create $Tag --repo $Repo --title $Tag --notes "Automated Windows installer build."
          }

          gh release upload $Tag $Installer --repo $Repo --clobber
